<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugarcane Digital Twin — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #9DBB28;
            --dark-green: #7F9D22;
            --light-green: #EAF3D1;
            --background: #FFFFFF;
            --section-bg: #F8FAF5;
            --border: #E5E7EB;
            --text: #1F2937;
            --muted-text: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #FFFFFF;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 40px 32px;
            background: #FFFFFF;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(157, 187, 40, 0.05);
            text-align: center;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark-green);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted-text);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            background-color: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(157, 187, 40, 0.12);
        }

        .btn-login {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            background-color: var(--primary-green);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            background-color: var(--dark-green);
        }

        .error-message {
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark-green);
            background: var(--light-green);
            border: 1px solid var(--primary-green);
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo">SUGARCANE</div>
        <div class="subtitle">Digital Twin Platform Admin Login</div>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login">Access Dashboard</button>
        </form>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
    </div>
</body>
</html>
