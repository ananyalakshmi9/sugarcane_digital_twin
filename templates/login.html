<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugarcane Digital Twin — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #FFFFFF;
            color: #1F2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            background: #FFFFFF;
            border: 2px solid #95B227;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(149, 178, 39, 0.08);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #95B227;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #95B227;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            background-color: #FFFFFF;
            border: 1.5px solid #95B227;
            border-radius: 8px;
            color: #1F2937;
            outline: none;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .form-group input:focus {
            box-shadow: 0 0 0 3px rgba(149, 178, 39, 0.15);
        }

        .btn-login {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            background-color: #95B227;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            color: #95B227;
            background: rgba(149, 178, 39, 0.05);
            border: 1px dashed #95B227;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">SUGARCANE</div>
        <div class="subtitle">Digital Twin Administration Login</div>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login">Access Dashboard</button>
        </form>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
    </div>
</body>
</html>
